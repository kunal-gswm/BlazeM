name: blamics
description: "Market events tracking application"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.1

  # Routing
  go_router: ^15.1.2

  # Local storage
  sqflite: ^2.4.1
  path: ^1.9.1
  shared_preferences: ^2.3.4

  # UI utilities
  shimmer: ^3.0.0
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # Utilities
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/data/

