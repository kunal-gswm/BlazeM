name: Scrape IPO Data

on:
  schedule:
    - cron: '*/30 * * * *'    # Every 30 minutes
  workflow_dispatch:           # Manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        run: python scraper/run.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Commit & push updated data
        run: |
          git config user.name "IPO Scraper Bot"
          git config user.email "ipo-bot@users.noreply.github.com"
          git add scraper/data/ipo_data.json
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Update IPO data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
