name: Live Data Pipelines (30 Min)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: blamics-data
  cancel-in-progress: false

jobs:
  live-scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Global Indices Pipeline
        continue-on-error: true
        run: |
          cd global_indices
          python run.py

      - name: Run Market Breadth Pipeline
        continue-on-error: true
        run: |
          cd market_breadth
          python run.py

      - name: Run IPO Pipeline
        continue-on-error: true
        run: |
          cd scraper
          python run.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/health.json global_indices/data market_breadth/data scraper/data
          git commit -m "chore(data): auto-update live data and health" || echo "No changes to commit"
          git push
