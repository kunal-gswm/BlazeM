name: Daily Data Pipelines (EOD)

on:
  schedule:
    # Runs at 13:00 UTC (18:30 IST) daily
    - cron: '0 13 * * *'
  workflow_dispatch:

concurrency:
  group: blamics-data
  cancel-in-progress: false

jobs:
  daily-scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run FII/DII Pipeline
        continue-on-error: true
        run: |
          cd fii_dii
          python run.py

      - name: Run Corporate Actions Pipeline
        continue-on-error: true
        run: |
          cd corporate_actions
          python run.py

      - name: Run Earnings Calendar Pipeline
        continue-on-error: true
        run: |
          cd earnings_calendar
          python run.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/health.json fii_dii/data corporate_actions/data earnings_calendar/data
          git commit -m "chore(data): auto-update daily data and health" || echo "No changes to commit"
          git push
